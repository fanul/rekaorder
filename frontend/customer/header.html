<!-- Header -->
<header class="bg-white shadow-sm sticky top-0 z-40">
  <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-10 h-10 bg-gradient-to-br from-terracotta to-rose rounded-xl flex items-center justify-center">
        <span class="text-white font-display font-bold text-lg">R</span>
      </div>
      <div>
        <h1 class="font-display font-semibold text-lg text-terracotta">RekaOrder</h1>
        <p class="text-xs text-gray-500">Pre Order Makanan</p>
      </div>
    </div>
    <button @click="toggleSearch" class="p-2 rounded-full hover:bg-sand transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </button>
  </div>

  <!-- Search Bar -->
  <div v-if="showSearch" class="border-t border-sand px-4 py-3 bg-white">
    <div class="relative">
      <input
        v-model="searchQuery"
        type="text"
        placeholder="Cari makanan favoritmu..."
        class="w-full px-4 py-3 pl-12 bg-sand rounded-xl border-0 focus:ring-2 focus:ring-terracotta focus:outline-none"
        @keyup.enter="performSearch"
      >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <button v-if="searchQuery" @click="clearSearch" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
</header>
