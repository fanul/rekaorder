<!-- Main Content -->
<main class="flex-1 pb-20">
  <div class="max-w-lg mx-auto px-4 py-4">

    <!-- Categories -->
    <div class="mb-6">
      <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2 -mx-4 px-4">
        <button
          @click="selectedCategory = 'all'"
          :class="[
            'px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all btn-press',
            selectedCategory === 'all'
              ? 'bg-terracotta text-white shadow-lg'
              : 'bg-white text-gray-600 border border-sand hover:border-terracotta'
          ]"
        >
          Semua
        </button>
        <button
          v-for="category in categories"
          :key="category"
          @click="selectedCategory = category"
          :class="[
            'px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all btn-press',
            selectedCategory === category
              ? 'bg-terracotta text-white shadow-lg'
              : 'bg-white text-gray-600 border border-sand hover:border-terracotta'
          ]"
        >
          {{ category }}
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div v-if="loading" class="space-y-4">
      <div v-for="i in 4" :key="i" class="bg-white rounded-2xl p-4 skeleton h-32"></div>
    </div>

    <!-- Products Grid -->
    <div v-else-if="filteredProducts.length > 0" class="grid grid-cols-2 gap-4">
      <div
        v-for="product in filteredProducts"
        :key="product.ProductID"
        class="bg-white rounded-2xl overflow-hidden shadow-sm card-hover"
        @click="openProductModal(product)"
      >
        <!-- Product Image -->
        <div class="relative aspect-square bg-sand">
          <img
            v-if="product.ImageURL"
            :src="product.ImageURL"
            :alt="product.Name"
            class="w-full h-full object-cover"
            @error="handleImageError($event)"
          >
          <div v-else class="w-full h-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-rose/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </div>

          <!-- Badges -->
          <div class="absolute top-2 left-2 flex flex-col gap-1">
            <!-- Preorder: show Preorder badge + LeadTime -->
            <span v-if="product.ProductType === 'Preorder'" class="bg-blue-500 text-white text-xs px-2 py-1 rounded-full font-medium">
              Preorder
            </span>
            <span v-if="product.ProductType === 'Preorder' && product.LeadTimeDays > 0" class="bg-rose text-white text-xs px-2 py-1 rounded-full font-medium">
              H+{{ product.LeadTimeDays }}
            </span>
            <span v-if="product.Tags && product.Tags.includes('best')" class="bg-gold text-white text-xs px-2 py-1 rounded-full font-medium">
              Best Seller
            </span>
          </div>

          <!-- Stock indicator (only for regular products) -->
          <template v-if="product.ProductType !== 'Preorder'">
            <div v-if="product.Stock <= 5 && product.Stock > 0" class="absolute bottom-2 right-2 bg-warning text-white text-xs px-2 py-1 rounded-full">
              Tinggal {{ product.Stock }}
            </div>
            <div v-if="product.Stock === 0" class="absolute inset-0 bg-black/50 flex items-center justify-center">
              <span class="bg-charcoal text-white text-xs px-3 py-1 rounded-full">Stok Habis</span>
            </div>
          </template>
        </div>

        <!-- Product Info -->
        <div class="p-3">
          <h3 class="font-semibold text-sm mb-1 line-clamp-1">{{ product.Name }}</h3>
          <p class="text-xs text-gray-500 line-clamp-2 mb-2">{{ product.Description }}</p>
          <div class="flex items-center justify-between">
            <span class="text-terracotta font-bold">
              Rp {{ Number(product.Price).toLocaleString('id-ID') }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div v-else class="text-center py-12">
      <div class="w-24 h-24 bg-sand rounded-full flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-rose" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h3 class="font-display text-lg font-semibold text-charcoal mb-2">Oops!</h3>
      <p class="text-gray-500">Produk yang kamu cari tidak ditemukan</p>
    </div>

  </div>
</main>
