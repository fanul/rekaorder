<!-- RekaOrder - Custom Styles (Warm Batik Luxe Theme) -->
<style>
  /* CSS Variables */
  :root {
    --color-cream: #FDF6EC;
    --color-terracotta: #C0622F;
    --color-terracotta-dark: #A04F20;
    --color-rose: #E8A598;
    --color-gold: #D4A853;
    --color-gold-light: #E8C87A;
    --color-sand: #F5E6D3;
    --color-charcoal: #2D2D2D;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* Base Styles */
  body {
    background-color: var(--color-cream);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Typography */
  .font-display {
    font-family: var(--font-display);
  }

  .font-body {
    font-family: var(--font-body);
  }

  /* Line Clamp */
  .line-clamp-1 {
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Animation Classes */
  .animate-slide-up {
    animation: slideUp 0.3s ease-out;
  }

  @keyframes slideUp {
    from {
      transform: translateY(100%);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .animate-fade-in {
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  .animate-scale-in {
    animation: scaleIn 0.2s ease-out;
  }

  @keyframes scaleIn {
    from {
      transform: scale(0.9);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  /* Custom Button Styles */
  .btn-primary {
    background: linear-gradient(135deg, var(--color-terracotta) 0%, var(--color-rose) 100%);
    color: white;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(192, 98, 47, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(192, 98, 47, 0.4);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  /* Card Styles */
  .card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    transition: all 0.3s ease;
  }

  .card:hover {
    box-shadow: 0 8px 24px rgba(192, 98, 47, 0.12);
    transform: translateY(-2px);
  }

  /* Input Styles */
  .input-field {
    background: var(--color-sand);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    transition: all 0.2s ease;
    width: 100%;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--color-terracotta);
    background: white;
    box-shadow: 0 0 0 4px rgba(192, 98, 47, 0.1);
  }

  .input-field::placeholder {
    color: #9CA3AF;
  }

  /* Badge Styles */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-terracotta {
    background: rgba(192, 98, 47, 0.1);
    color: var(--color-terracotta);
  }

  .badge-gold {
    background: rgba(212, 168, 83, 0.15);
    color: #B8860B;
  }

  .badge-rose {
    background: rgba(232, 165, 152, 0.2);
    color: #C0622F;
  }

  /* Status Badge */
  .status-badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .status baru {
    background: #DBEAFE;
    color: #1D4ED8;
  }

  .status dikonfirmasi {
    background: #FEF3C7;
    color: #B45309;
  }

  .status diproses {
    background: #E9D5FF;
    color: #7C3AED;
  }

  .status siap {
    background: #FED7AA;
    color: #EA580C;
  }

  .status selesai {
    background: #D1FAE5;
    color: #059669;
  }

  .status batal {
    background: #FEE2E2;
    color: #DC2626;
  }

  /* Price Tag */
  .price {
    font-size: 18px;
    font-weight: 700;
    color: var(--color-terracotta);
  }

  /* Loading Spinner */
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--color-sand);
    border-top-color: var(--color-terracotta);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* Skeleton Loading */
  .skeleton {
    background: linear-gradient(90deg,
      var(--color-sand) 25%,
      #E8E0D5 50%,
      var(--color-sand) 75%
    );
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 12px;
  }

  @keyframes shimmer {
    0% {
      background-position: 200% 0;
    }
    100% {
      background-position: -200% 0;
    }
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
  }

  .empty-state-icon {
    width: 80px;
    height: 80px;
    background: var(--color-sand);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .empty-state-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--color-charcoal);
    margin-bottom: 8px;
  }

  .empty-state-text {
    color: #6B7280;
    font-size: 14px;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--color-sand);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--color-rose);
  }

  /* PWA Install Banner */
  .pwa-banner {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 12px 20px;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 45;
    max-width: calc(100% - 32px);
  }

  .pwa-banner-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--color-terracotta), var(--color-rose));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pwa-banner-text {
    font-size: 13px;
    color: var(--color-charcoal);
  }

  .pwa-banner-btn {
    background: var(--color-terracotta);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Pulse Animation for Cart Badge */
  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.1);
    }
  }

  .cart-badge-pulse {
    animation: pulse 2s infinite;
  }

  /* Touch Optimizations */
  @media (hover: none) and (pointer: coarse) {
    button,
    [role="button"] {
      min-height: 44px;
      min-width: 44px;
    }

    .btn-primary {
      padding: 16px 28px;
    }
  }

  /* Safe Area for iPhone X+ */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .safe-area-bottom {
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
  }

  /* High Contrast Mode Support */
  @media (prefers-contrast: high) {
    :root {
      --color-terracotta: #A04F20;
      --color-rose: #C0622F;
    }

    .card {
      border: 2px solid var(--color-charcoal);
    }
  }

  /* Reduced Motion */
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
