<!-- Product Modal -->
<div
  v-if="selectedProduct"
  class="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center"
  @click.self="closeProductModal"
>
  <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-slide-up">
    <!-- Close button -->
    <button @click="closeProductModal" class="absolute top-4 right-4 z-10 bg-white/80 rounded-full p-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Product Image -->
    <div class="relative aspect-square bg-sand">
      <img
        v-if="selectedProduct.ImageURL"
        :src="selectedProduct.ImageURL"
        :alt="selectedProduct.Name"
        class="w-full h-full object-cover"
        @error="handleImageError($event)"
      >
      <div v-else class="w-full h-full flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-rose/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    </div>

    <!-- Product Details -->
    <div class="p-6">
      <div class="flex items-start justify-between mb-2">
        <h2 class="font-display text-2xl font-bold text-charcoal">{{ selectedProduct.Name }}</h2>
        <span v-if="selectedProduct.LeadTimeDays > 0" class="bg-rose text-white text-sm px-3 py-1 rounded-full font-medium">
          H+{{ selectedProduct.LeadTimeDays }}
        </span>
      </div>

      <p class="text-gray-600 mb-4">{{ selectedProduct.Description }}</p>

      <div class="flex items-center gap-2 mb-4">
        <span class="bg-sand text-terracotta px-3 py-1 rounded-full text-sm font-medium">
          {{ selectedProduct.Category }}
        </span>
        <span v-if="selectedProduct.Stock > 0 && selectedProduct.Stock <= 5" class="bg-warning/10 text-warning text-sm px-3 py-1 rounded-full font-medium">
          Tinggal {{ selectedProduct.Stock }}
        </span>
        <span v-if="selectedProduct.Tags && selectedProduct.Tags.includes('best')" class="bg-gold/10 text-gold text-sm px-3 py-1 rounded-full font-medium">
          Best Seller
        </span>
      </div>

      <div class="text-3xl font-bold text-terracotta mb-6">
        Rp {{ Number(selectedProduct.Price).toLocaleString('id-ID') }}
      </div>

      <!-- Quantity Selector -->
      <div class="flex items-center justify-between bg-sand rounded-xl p-2 mb-6">
        <button
          @click="decreaseQuantity"
          class="w-12 h-12 bg-white rounded-lg flex items-center justify-center text-terracotta font-bold text-xl hover:bg-terracotta hover:text-white transition-colors btn-press"
          :disabled="quantity <= 1"
        >
          -
        </button>
        <span class="text-xl font-bold">{{ quantity }}</span>
        <button
          @click="increaseQuantity"
          class="w-12 h-12 bg-white rounded-lg flex items-center justify-center text-terracotta font-bold text-xl hover:bg-terracotta hover:text-white transition-colors btn-press"
          :disabled="quantity >= selectedProduct.Stock"
        >
          +
        </button>
      </div>

      <!-- Add to Cart Button -->
      <button
        @click="addToCart"
        :disabled="selectedProduct.Stock === 0"
        class="w-full bg-gradient-to-r from-terracotta to-rose text-white font-semibold py-4 rounded-xl shadow-lg hover:shadow-xl transition-all btn-press disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span v-if="selectedProduct.Stock === 0">Stok Habis</span>
        <span v-else>Tambah ke Keranjang</span>
      </button>
    </div>
  </div>
</div>
