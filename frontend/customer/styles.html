<!-- RekaOrder - Custom Styles (Warm Batik Luxe Theme) -->
<style>
  /* CSS Variables */
  :root {
    --color-cream: #FDF6EC;
    --color-terracotta: #C0622F;
    --color-terracotta-dark: #A04F20;
    --color-rose: #E8A598;
    --color-gold: #D4A853;
    --color-gold-light: #E8C87A;
    --color-sand: #F5E6D3;
    --color-charcoal: #2D2D2D;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* Base Styles */
  body {
    background-color: var(--color-cream);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .font-display { font-family: var(--font-display); }
  .font-body { font-family: var(--font-body); }

  .line-clamp-1 {
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Animation Classes */
  .animate-slide-up {
    animation: slideUp 0.3s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .animate-fade-in {
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Button Styles */
  .btn-primary {
    background: linear-gradient(135deg, var(--color-terracotta) 0%, var(--color-rose) 100%);
    color: white;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(192, 98, 47, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(192, 98, 47, 0.4);
  }

  .btn-press:active {
    transform: scale(0.97);
  }

  /* Card Styles */
  .card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    transition: all 0.3s ease;
  }

  .card-hover:hover {
    box-shadow: 0 8px 24px rgba(192, 98, 47, 0.12);
    transform: translateY(-2px);
  }

  /* Input Styles */
  .input-field {
    background: var(--color-sand);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    transition: all 0.2s ease;
    width: 100%;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--color-terracotta);
    background: white;
    box-shadow: 0 0 0 4px rgba(192, 98, 47, 0.1);
  }

  /* Badge Styles */
  .badge-glow {
    box-shadow: 0 0 10px rgba(232, 165, 152, 0.5);
  }

  /* Skeleton Loading */
  .skeleton {
    background: linear-gradient(90deg, var(--color-sand) 25%, #E8E0D5 50%, var(--color-sand) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 12px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Toast Animation */
  @keyframes slideInUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .toast-enter {
    animation: slideInUp 0.3s ease-out;
  }

  /* Scrollbar */
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Safe Area */
  .safe-bottom {
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  /* Touch Optimizations */
  @media (hover: none) and (pointer: coarse) {
    button, [role="button"] {
      min-height: 44px;
      min-width: 44px;
    }
  }

  /* Reduced Motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
