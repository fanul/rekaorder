<script>
(function() {
  'use strict';

  function initVue() {
    if (typeof Vue === 'undefined') {
      setTimeout(initVue, 100);
      return;
    }

    var createApp = Vue.createApp;
    var ref = Vue.ref;
    var computed = Vue.computed;
    var onMounted = Vue.onMounted;
    var watch = Vue.watch;

    createApp({
      setup: function() {
        // State
        var loading = ref(true);
        var products = ref([]);
        var cart = ref([]);
        var currentTab = ref('home');
        var selectedCategory = ref('all');
        var selectedProduct = ref(null);
        var productImageIndex = ref(0);
        var quantity = ref(1);
        var showSearch = ref(false);
        var searchQuery = ref('');
        var categories = ref(['Makanan', 'Minuman', 'Snack', 'Dessert']);

        // Customer data
        var customerName = ref('');
        var customerPhone = ref('');
        var customerAddress = ref('');
        var deliveryDate = ref('');
        var paymentMethod = ref('Transfer Bank');

        // Order state
        var myOrders = ref([]);
        var submitting = ref(false);
        var deliveryFee = ref(0);
        var paymentMethods = ref(['Transfer Bank', 'COD', 'E-Wallet']);

        // UI state
        var toast = ref({ show: false, message: '', type: 'success' });
        var showSuccessModal = ref(false);
        var lastOrderId = ref('');

        // Computed
        var filteredProducts = computed(function() {
          var result = products.value;
          if (selectedCategory.value !== 'all') {
            result = result.filter(function(p) { return p.Category === selectedCategory.value; });
          }
          if (searchQuery.value) {
            var query = searchQuery.value.toLowerCase();
            result = result.filter(function(p) {
              return p.Name.toLowerCase().indexOf(query) > -1 ||
                     p.Description.toLowerCase().indexOf(query) > -1;
            });
          }
          return result;
        });

        var cartSubtotal = computed(function() {
          return cart.value.reduce(function(sum, item) { return sum + (item.price * item.quantity); }, 0);
        });

        var cartTotal = computed(function() {
          return cartSubtotal.value + deliveryFee.value;
        });

        var minDeliveryDate = computed(function() {
          var today = new Date();
          today.setDate(today.getDate() + 1);
          return today.toISOString().split('T')[0];
        });

        var isCartValid = computed(function() {
          return cart.value.length > 0 &&
                 customerName.value.trim() &&
                 customerPhone.value.trim() &&
                 customerAddress.value.trim() &&
                 deliveryDate.value &&
                 paymentMethod.value;
        });

        var whatsappLink = computed(function() {
          var message = 'Halo RekaOrder, saya ' + customerName.value + ' ingin konfirmasi pesanan saya dengan ID: ' + lastOrderId.value;
          return 'https://wa.me/?text=' + encodeURIComponent(message);
        });

        // Methods
        var loadProducts = function() {
          loading.value = true;
          google.script.run.withSuccessHandler(function(r) {
            if (r.success) {
              products.value = r.products;
              // Extract unique categories dynamically
              var uniqueCategories = ['all'];
              products.value.forEach(function(p) {
                if (p.Category && uniqueCategories.indexOf(p.Category) === -1) {
                  uniqueCategories.push(p.Category);
                }
              });
              categories.value = uniqueCategories;
            }
            loading.value = false;
          }).getProducts({});
        };

        var loadSettings = function() {
          google.script.run.withSuccessHandler(function(r) {
            deliveryFee.value = Number(r.DELIVERY_FEE) || 0;
          }).getSettings();
          // Also load categories from properties
          google.script.run.withSuccessHandler(function(cats) {
            if (cats && cats.length > 0) {
              categories.value = ['all'].concat(cats);
            }
          }).getCategories();
        };

        var loadCart = function() {
          var saved = localStorage.getItem('rekaorder_cart');
          if (saved) {
            cart.value = JSON.parse(saved);
          }
        };

        var saveCart = function() {
          localStorage.setItem('rekaorder_cart', JSON.stringify(cart.value));
        };

        var openProductModal = function(product) {
          selectedProduct.value = product;
          productImageIndex.value = 0;
          quantity.value = 1;
        };

        var closeProductModal = function() {
          selectedProduct.value = null;
        };

        var increaseQuantity = function() {
          var isPreorder = selectedProduct.value.ProductType === 'Preorder';
          var maxQty = isPreorder ? 999 : selectedProduct.value.Stock;
          if (quantity.value < maxQty) {
            quantity.value++;
          }
        };

        var decreaseQuantity = function() {
          if (quantity.value > 1) {
            quantity.value--;
          }
        };

        var prevProductImage = function() {
          var images = selectedProduct.value.Images || [];
          if (images.length === 0) return;
          if (productImageIndex.value > 0) {
            productImageIndex.value--;
          } else {
            productImageIndex.value = images.length - 1;
          }
        };

        var nextProductImage = function() {
          var images = selectedProduct.value.Images || [];
          if (images.length === 0) return;
          if (productImageIndex.value < images.length - 1) {
            productImageIndex.value++;
          } else {
            productImageIndex.value = 0;
          }
        };

        var addToCart = function() {
          var item = {
            productId: selectedProduct.value.ProductID,
            name: selectedProduct.value.Name,
            price: selectedProduct.value.Price,
            quantity: quantity.value,
            ImageURL: selectedProduct.value.ImageURL,
            LeadTimeDays: selectedProduct.value.LeadTimeDays
          };

          var existing = cart.value.find(function(c) { return c.productId === item.productId; });
          if (existing) {
            existing.quantity += quantity.value;
          } else {
            cart.value.push(item);
          }

          saveCart();
          closeProductModal();
          showToast('Ditambahkan ke keranjang!', 'success');
          currentTab.value = 'cart';
        };

        var updateCartQuantity = function(index, newQty) {
          if (newQty <= 0) {
            cart.value.splice(index, 1);
          } else {
            cart.value[index].quantity = newQty;
          }
          saveCart();
        };

        var removeFromCart = function(index) {
          cart.value.splice(index, 1);
          saveCart();
        };

        var submitOrder = function() {
          if (!isCartValid.value) {
            showToast('Mohon lengkapi semua data', 'error');
            return;
          }

          submitting.value = true;

          new Promise(function(resolve, reject) {
            google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).submitOrder({
              customerName: customerName.value,
              customerPhone: customerPhone.value,
              customerAddress: customerAddress.value,
              deliveryDate: deliveryDate.value,
              paymentMethod: paymentMethod.value,
              cart: cart.value
            });
          }).then(function(result) {
            if (result.success) {
              lastOrderId.value = result.orderId;
              cart.value = [];
              saveCart();
              showSuccessModal.value = true;
              myOrders.value.unshift({
                OrderID: result.orderId,
                Timestamp: new Date().toISOString(),
                TotalAmount: result.totalAmount,
                Status: 'Baru'
              });
            } else {
              showToast(result.error || 'Gagal submit pesanan', 'error');
            }
          })['catch'](function(error) {
            console.error('Error submitting order:', error);
            showToast('Terjadi kesalahan', 'error');
          })['finally'](function() {
            submitting.value = false;
          });
        };

        var closeSuccessModal = function() {
          showSuccessModal.value = false;
          currentTab.value = 'orders';
          customerName.value = '';
          customerPhone.value = '';
          customerAddress.value = '';
          deliveryDate.value = '';
        };

        var showToast = function(message, type) {
          if (type === undefined) type = 'success';
          toast.value = { show: true, message: message, type: type };
          setTimeout(function() {
            toast.value.show = false;
          }, 3000);
        };

        var toggleSearch = function() {
          showSearch.value = !showSearch.value;
          if (!showSearch.value) {
            searchQuery.value = '';
          }
        };

        var performSearch = function() {};

        var clearSearch = function() {
          searchQuery.value = '';
        };

        var formatDate = function(dateStr) {
          var date = new Date(dateStr);
          return date.toLocaleDateString('id-ID', {
            day: 'numeric',
            month: 'short',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        };

        var handleImageError = function(event) {
          event.target.style.display = 'none';
        };

        watch(cart, saveCart, { deep: true });

        onMounted(function() {
          loadProducts();
          loadSettings();
          loadCart();
          var tomorrow = new Date();
          tomorrow.setDate(tomorrow.getDate() + 1);
          deliveryDate.value = tomorrow.toISOString().split('T')[0];
        });

        return {
          scriptUrl: window.scriptUrl || '',
          loading: loading,
          products: products,
          cart: cart,
          currentTab: currentTab,
          selectedCategory: selectedCategory,
          selectedProduct: selectedProduct,
          quantity: quantity,
          showSearch: showSearch,
          searchQuery: searchQuery,
          categories: categories,
          customerName: customerName,
          customerPhone: customerPhone,
          customerAddress: customerAddress,
          deliveryDate: deliveryDate,
          paymentMethod: paymentMethod,
          paymentMethods: paymentMethods,
          myOrders: myOrders,
          submitting: submitting,
          deliveryFee: deliveryFee,
          toast: toast,
          showSuccessModal: showSuccessModal,
          lastOrderId: lastOrderId,
          filteredProducts: filteredProducts,
          cartSubtotal: cartSubtotal,
          cartTotal: cartTotal,
          minDeliveryDate: minDeliveryDate,
          isCartValid: isCartValid,
          whatsappLink: whatsappLink,
          openProductModal: openProductModal,
          closeProductModal: closeProductModal,
          increaseQuantity: increaseQuantity,
          decreaseQuantity: decreaseQuantity,
          productImageIndex: productImageIndex,
          prevProductImage: prevProductImage,
          nextProductImage: nextProductImage,
          addToCart: addToCart,
          updateCartQuantity: updateCartQuantity,
          removeFromCart: removeFromCart,
          submitOrder: submitOrder,
          closeSuccessModal: closeSuccessModal,
          showToast: showToast,
          toggleSearch: toggleSearch,
          performSearch: performSearch,
          clearSearch: clearSearch,
          formatDate: formatDate,
          handleImageError: handleImageError
        };
      }
    }).mount('#app');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initVue);
  } else {
    initVue();
  }
})();
</script>
