<script>
(function() {
  'use strict';

  function initVue() {
    if (typeof Vue === 'undefined' || typeof google === 'undefined' || !google.script || !google.script.run) {
      setTimeout(initVue, 100);
      return;
    }

    var createApp = Vue.createApp;
    var ref = Vue.ref;
    var computed = Vue.computed;
    var onMounted = Vue.onMounted;

    createApp({
      setup: function() {
        // State
        var currentView = ref('orders');
        var statusFilter = ref('');
        var showAddProduct = ref(false);
        var editingProduct = ref(null);
        var selectedOrder = ref(null);
        var uploadError = ref('');
        var newCategory = ref('');

        var productForm = ref({
          Name: '',
          Description: '',
          Category: 'Makanan',
          Price: 0,
          ProductType: 'Regular',
          LeadTimeDays: 0,
          Stock: 0,
          DailyCapacity: 0,
          Images: '',
          Tags: ''
        });

        // Initialize modules with Vue
        var modules = initAdminModules(Vue);
        var productModule = new modules.ProductModule();
        var orderModule = new modules.OrderModule();
        var imageModule = new modules.ImageModule();
        var settingsModule = new modules.SettingsModule();

        // Computed
        var filteredOrders = computed(function() {
          return orderModule.filterByStatus(orderModule.orders.value, statusFilter.value);
        });

        var stats = computed(function() {
          return orderModule.getStats();
        });

        var categories = computed(function() {
          return settingsModule.categories.value;
        });

        // Methods - Products
        var loadProducts = function() {
          return productModule.loadProducts();
        };

        var editProduct = function(product) {
          editingProduct.value = product;
          productForm.value = {
            Name: product.Name || '',
            Description: product.Description || '',
            Category: product.Category || 'Makanan',
            Price: product.Price || 0,
            ProductType: product.ProductType || 'Regular',
            LeadTimeDays: product.LeadTimeDays || 0,
            Stock: product.Stock || 0,
            DailyCapacity: product.DailyCapacity || 0,
            Images: product.Images ? product.Images.map(function(img) { return img.id; }).join(',') : '',
            Tags: product.Tags || ''
          };
          imageModule.loadImages(product);
          showAddProduct.value = true;
        };

        var closeProductModal = function() {
          showAddProduct.value = false;
          editingProduct.value = null;
          productForm.value = productModule.getDefaultForm();
          imageModule.reset();
        };

        var saveProduct = function() {
          var productData = {
            Name: productForm.value.Name,
            Description: productForm.value.Description,
            Category: productForm.value.Category,
            Price: productForm.value.Price,
            ProductType: productForm.value.ProductType,
            LeadTimeDays: productForm.value.LeadTimeDays,
            Stock: productForm.value.Stock,
            DailyCapacity: productForm.value.DailyCapacity,
            Images: imageModule.getImageIds(),
            Tags: productForm.value.Tags
          };

          var promise;
          if (editingProduct.value) {
            productData.ProductID = editingProduct.value.ProductID;
            promise = productModule.updateProduct(productData);
          } else {
            promise = productModule.addProduct(productData);
          }

          return promise.then(function() {
            closeProductModal();
            loadProducts();
          });
        };

        var deleteProduct = function(productId) {
          if (!confirm('Yakin ingin menghapus produk ini?')) return;
          return productModule.deleteProduct(productId).then(function() {
            loadProducts();
          });
        };

        var toggleAvailability = function(productId) {
          return productModule.toggleAvailability(productId).then(function() {
            loadProducts();
          });
        };

        // Methods - Orders
        var loadOrders = function() {
          return orderModule.loadOrders();
        };

        var updateStatus = function(orderId, newStatus) {
          return orderModule.updateStatus(orderId, newStatus);
        };

        var exportOrders = function() {
          return orderModule.exportCSV();
        };

        var viewOrderDetail = function(order) {
          selectedOrder.value = order;
        };

        var parseCart = function(cartJson) {
          return orderModule.parseCart(cartJson);
        };

        // Methods - Settings
        var loadSettings = function() {
          return settingsModule.loadSettings();
        };

        var saveSettings = function() {
          return settingsModule.saveSettings().then(function(result) {
            if (result.success) {
              alert('Pengaturan tersimpan!');
            }
          });
        };

        // Methods - Categories
        var addCategory = function() {
          var cat = newCategory.value.trim();
          if (!cat) return;
          if (categories.value.indexOf(cat) > -1) {
            alert('Kategori sudah ada!');
            return;
          }
          settingsModule.categories.value.push(cat);
          settingsModule.saveCategories();
          newCategory.value = '';
        };

        var removeCategory = function(index) {
          settingsModule.categories.value.splice(index, 1);
          settingsModule.saveCategories();
        };

        // Methods - Image
        var prevImage = function() {
          imageModule.prevImage();
        };

        var nextImage = function() {
          imageModule.nextImage();
        };

        var removeImage = function(index) {
          imageModule.removeImage(index);
        };

        var handleImageUpload = function(event) {
          var file = event.target.files[0];
          if (!file) return;

          imageModule.uploadImage(file, editingProduct.value ? editingProduct.value.ProductID : null)
            .then(function(result) {
              if (!result.success) {
                uploadError.value = result.error;
              }
            });
        };

        // Methods - Utils
        var formatDate = function(date) {
          return settingsModule.formatDate(date);
        };

        // Lifecycle
        onMounted(function() {
          loadOrders();
          loadProducts();
          loadSettings();
        });

        // Return
        return {
          scriptUrl: window.scriptUrl || '',
          currentView: currentView,
          orders: orderModule.orders,
          products: productModule.products,
          statusFilter: statusFilter,
          filteredOrders: filteredOrders,
          stats: stats,
          showAddProduct: showAddProduct,
          editingProduct: editingProduct,
          productForm: productForm,
          selectedOrder: selectedOrder,
          settings: settingsModule.settings,
          categories: settingsModule.categories,
          newCategory: newCategory,
          addCategory: addCategory,
          removeCategory: removeCategory,
          uploadingImage: imageModule.uploading,
          uploadError: uploadError,
          productImages: imageModule.images,
          currentImageIndex: imageModule.currentIndex,
          prevImage: prevImage,
          nextImage: nextImage,
          removeImage: removeImage,
          updateStatus: updateStatus,
          exportOrders: exportOrders,
          viewOrderDetail: viewOrderDetail,
          parseCart: parseCart,
          editProduct: editProduct,
          closeProductModal: closeProductModal,
          saveProduct: saveProduct,
          deleteProduct: deleteProduct,
          toggleAvailability: toggleAvailability,
          saveSettings: saveSettings,
          formatDate: formatDate,
          handleImageUpload: handleImageUpload
        };
      }
    }).mount('#app');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initVue);
  } else {
    initVue();
  }
})();
</script>
